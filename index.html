<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALUF - Control de Funciones 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231a3d2e'/><path d='M50 20 Q65 35 60 55 Q55 70 50 80 Q45 70 40 55 Q35 35 50 20' fill='%2327ae60'/><circle cx='50' cy='50' r='8' fill='%23c9a962'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* PALUF BRAND COLORS */
        :root {
            /* Primary Greens */
            --verde-bosque: #0d2818;
            --verde-oscuro: #1a3d2e;
            --verde-medio: #2d5a45;
            --verde-claro: #4a7c65;
            --verde-menta: #7cb894;
            
            /* Gold/Dorado */
            --dorado-oscuro: #a68a42;
            --dorado: #c9a962;
            --dorado-claro: #e8d5a0;
            --dorado-luz: #f5ebc4;
            
            /* Neutrals */
            --marron: #5c4a3a;
            --marron-claro: #8b7355;
            --crema: #f5f0e6;
            --crema-oscuro: #e8e0d0;
            --blanco: #ffffff;
            
            /* Status Colors */
            --rojo: #c0392b;
            --rojo-claro: #e74c3c;
            --verde-check: #27ae60;
            --naranja: #e67e22;
            --azul: #3498db;
            --gris: #95a5a6;
            --gris-claro: #bdc3c7;
            
            /* Shadows */
            --sombra-suave: rgba(26, 61, 46, 0.1);
            --sombra-media: rgba(26, 61, 46, 0.2);
        }

        /* DARK MODE */
        body.dark-mode {
            --crema: #1a1a2e;
            --crema-oscuro: #16213e;
            --blanco: #1f2937;
            --marron: #e5e7eb;
            --gris: #9ca3af;
            --verde-oscuro: #065f46;
            --verde-medio: #047857;
            --sombra-suave: rgba(0, 0, 0, 0.3);
            --sombra-media: rgba(0, 0, 0, 0.5);
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }
        body.dark-mode header { background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%); }
        body.dark-mode .sidebar { background: #1f2937; border-right-color: #374151; }
        body.dark-mode .sidebar h3 { color: #e5e7eb; }
        body.dark-mode .person-item { color: #e5e7eb; }
        body.dark-mode .person-item:hover { background: #374151; }
        body.dark-mode .filters { background: linear-gradient(90deg, #1f2937 0%, #374151 100%); }
        body.dark-mode .filter-chip { background: #374151; color: #e5e7eb; border-color: #4b5563; }
        body.dark-mode .stats-bar { background: linear-gradient(135deg, #1f2937 0%, #374151 100%); border-color: #4b5563; }
        body.dark-mode .attendance-table { background: #1f2937; border-color: #374151; }
        body.dark-mode .attendance-row { border-bottom-color: #374151; }
        body.dark-mode .dashboard { background: #1f2937; border-color: #4b5563; }
        body.dark-mode .dashboard-header { border-bottom-color: #4b5563; }
        body.dark-mode .dashboard-header h3 { color: #e5e7eb; }
        body.dark-mode .chart-card { background: #374151; border-color: #4b5563; }
        body.dark-mode .chart-card h4 { color: #e5e7eb; }
        body.dark-mode .area-card { background: #374151; }
        body.dark-mode .bar-chart-bar { background: #4b5563; }
        body.dark-mode .modal-content { background: #1f2937; }
        body.dark-mode .modal-header { background: #374151; }
        body.dark-mode .comment-item { background: #374151; border-color: #4b5563; }
        body.dark-mode .comment-header { color: #e5e7eb; }
        body.dark-mode .comment-text { color: #d1d5db; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, var(--crema) 0%, var(--crema-oscuro) 100%);
            color: var(--marron);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--verde-bosque) 0%, var(--verde-oscuro) 50%, var(--verde-medio) 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px var(--sombra-media);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-img {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--dorado) 0%, var(--dorado-oscuro) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(201, 169, 98, 0.4);
            border: 2px solid var(--dorado-claro);
        }
        
        .logo-img svg {
            width: 35px;
            height: 35px;
        }
        
        .logo-text h1 { 
            color: var(--blanco); 
            font-size: 22px; 
            font-weight: 300; 
            letter-spacing: 2px;
            line-height: 1.1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .logo-text span { color: var(--dorado); font-weight: 600; }
        .logo-text small { 
            color: var(--dorado-claro); 
            font-size: 11px; 
            display: block;
            letter-spacing: 1px;
        }

        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
            box-shadow: 0 4px 15px var(--sombra-suave);
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--dorado) 0%, var(--dorado-oscuro) 100%); 
            color: var(--verde-bosque); 
        }
        .btn-secondary { 
            background: rgba(255,255,255,0.15); 
            color: var(--blanco); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-success { 
            background: linear-gradient(135deg, var(--verde-check) 0%, var(--verde-medio) 100%); 
            color: var(--blanco); 
        }
        .btn-danger { 
            background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-claro) 100%); 
            color: var(--blanco); 
        }
        .btn:hover { 
            transform: translateY(-2px) scale(1.02); 
            box-shadow: 0 6px 20px var(--sombra-media);
        }

        .btn-dark-mode {
            background: var(--crema-oscuro);
            border: 2px solid var(--dorado);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-dark-mode:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px var(--sombra-media);
        }
        body.dark-mode .btn-dark-mode {
            background: #374151;
        }

        /* LOGIN */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--verde-bosque) 0%, var(--verde-oscuro) 50%, var(--verde-medio) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background: linear-gradient(180deg, var(--blanco) 0%, var(--crema) 100%);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .login-box h1 { color: var(--verde-oscuro); margin-bottom: 5px; letter-spacing: 3px; }
        .login-box h1 span { color: var(--dorado); font-weight: 600; }
        .login-box .subtitle { color: var(--marron); margin-bottom: 10px; font-size: 14px; }
        
        .login-logo {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .user-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        .user-btn {
            padding: 15px;
            background: var(--crema);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-btn:hover { border-color: var(--dorado); transform: scale(1.02); }
        .avatar { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, var(--verde-oscuro) 0%, var(--verde-medio) 100%);
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0 auto 8px auto;
            color: var(--dorado);
            font-size: 20px;
        }
        .name { font-weight: 600; font-size: 13px; }
        
        .person-item i { margin-right: 8px; color: var(--dorado); }
        .person-item.active i { color: var(--dorado-claro); }
        
        .area-icon { font-size: 20px; color: var(--verde-oscuro); }
        .area-icon i { margin-right: 0; }

        /* MAIN LAYOUT */
        .main-container { display: flex; min-height: calc(100vh - 70px); }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--blanco) 0%, var(--crema) 100%);
            padding: 20px;
            border-right: 3px solid var(--verde-oscuro);
            overflow-y: auto;
            max-height: calc(100vh - 70px);
            box-shadow: 4px 0 20px var(--sombra-suave);
        }

        .sidebar h3 { 
            color: var(--verde-oscuro); 
            margin-bottom: 15px; 
            font-size: 14px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--dorado);
            padding-bottom: 10px;
        }

        .person-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .person-item:hover { 
            background: var(--dorado-luz); 
            border-color: var(--dorado);
        }
        .person-item.active { 
            background: linear-gradient(135deg, var(--verde-oscuro) 0%, var(--verde-medio) 100%); 
            color: white; 
            border-color: var(--dorado);
            box-shadow: 0 4px 15px var(--sombra-media);
        }
        .person-item .stats { 
            background: var(--dorado); 
            color: var(--verde-bosque); 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 12px;
            font-weight: 600;
        }
        .person-item.active .stats { 
            background: var(--dorado); 
            color: var(--verde-oscuro); 
        }

        /* CONTENT */
        .content { flex: 1; padding: 20px; overflow-x: auto; }

        /* FILTERS */
        .filters {
            padding: 15px 20px;
            background: linear-gradient(90deg, var(--blanco) 0%, var(--crema) 100%);
            border-bottom: 3px solid var(--verde-oscuro);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            overflow-x: auto;
        }

        .filter-chip {
            padding: 8px 16px;
            background: var(--blanco);
            border: 2px solid var(--verde-claro);
            border-radius: 25px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .filter-chip:hover, .filter-chip.active { 
            background: linear-gradient(135deg, var(--verde-medio) 0%, var(--verde-claro) 100%); 
            color: white;
            border-color: var(--verde-oscuro);
            box-shadow: 0 4px 15px var(--sombra-suave);
        }

        /* QUICK ACTIONS */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        /* CALENDAR HEADER */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .month-nav { display: flex; align-items: center; gap: 15px; }
        .month-nav button { 
            background: linear-gradient(135deg, var(--verde-oscuro) 0%, var(--verde-medio) 100%); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            cursor: pointer;
            box-shadow: 0 4px 15px var(--sombra-suave);
            transition: all 0.3s;
        }
        .month-nav button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--sombra-media);
        }
        .month-nav span { font-weight: 600; font-size: 18px; color: var(--verde-oscuro); }

        .btn-hoy {
            background: linear-gradient(135deg, var(--dorado) 0%, var(--dorado-oscuro) 100%) !important;
            color: var(--verde-bosque) !important;
            font-weight: 700 !important;
            border: 2px solid var(--dorado-claro) !important;
            animation: pulse-hoy 2s infinite;
        }
        .btn-hoy:hover {
            animation: none;
            transform: scale(1.05);
        }
        @keyframes pulse-hoy {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201, 169, 98, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(201, 169, 98, 0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-bar { 
            display: flex; 
            gap: 20px; 
            background: linear-gradient(135deg, var(--blanco) 0%, var(--crema) 100%);
            padding: 15px 25px; 
            border-radius: 16px; 
            flex-wrap: wrap;
            box-shadow: 0 4px 20px var(--sombra-suave);
            border: 2px solid var(--dorado-claro);
        }
        .stat-item { text-align: center; }
        .stat-item .value { font-size: 24px; font-weight: bold; color: var(--verde-oscuro); }
        .stat-item .label { font-size: 11px; color: var(--gris); font-weight: 600; }

        /* DASHBOARD */
        .dashboard {
            background: var(--blanco);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px var(--sombra-media);
            border: 3px solid var(--dorado);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--dorado-claro);
        }
        .dashboard-header h3 {
            color: var(--verde-oscuro);
            font-size: 18px;
        }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .dash-stat-card {
            background: linear-gradient(135deg, var(--verde-oscuro) 0%, var(--verde-medio) 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px var(--sombra-media);
        }
        .dash-stat-card.gold {
            background: linear-gradient(135deg, var(--dorado-oscuro) 0%, var(--dorado) 100%);
            color: var(--verde-bosque);
        }
        .dash-stat-card .value { font-size: 32px; font-weight: bold; }
        .dash-stat-card .label { font-size: 12px; opacity: 0.9; margin-top: 5px; }
        
        .dashboard-charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-card {
            background: var(--crema);
            padding: 20px;
            border-radius: 16px;
            border: 2px solid var(--dorado-claro);
        }
        .chart-card h4 {
            color: var(--verde-oscuro);
            margin-bottom: 15px;
            font-size: 14px;
        }
        .bar-chart-item {
            margin-bottom: 12px;
        }
        .bar-chart-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
            color: var(--marron);
        }
        .bar-chart-bar {
            height: 24px;
            background: var(--gris-claro);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .bar-chart-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }
        .bar-chart-fill.high { background: linear-gradient(90deg, var(--verde-check) 0%, var(--verde-menta) 100%); }
        .bar-chart-fill.medium { background: linear-gradient(90deg, var(--naranja) 0%, var(--dorado) 100%); }
        .bar-chart-fill.low { background: linear-gradient(90deg, var(--rojo) 0%, var(--rojo-claro) 100%); }
        .bar-chart-item.no-tasks { opacity: 0.5; }

        /* PODIUM & MEDALS */
        .podium-card { background: linear-gradient(135deg, #fef9e7 0%, #fdebd0 100%); }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            padding: 20px 0;
        }
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .medal-display { font-size: 32px; margin-bottom: 5px; }
        .podium-name { font-weight: 700; color: var(--verde-oscuro); font-size: 13px; }
        .podium-percent { font-size: 16px; font-weight: bold; color: var(--dorado-oscuro); }
        .podium-bar {
            width: 60px;
            background: linear-gradient(180deg, var(--dorado) 0%, var(--dorado-oscuro) 100%);
            border-radius: 8px 8px 0 0;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(201, 169, 98, 0.3);
        }
        .podium-item.first .podium-bar {
            background: linear-gradient(180deg, #ffd700 0%, #daa520 100%);
            height: 80px;
        }
        .podium-item.second .podium-bar {
            background: linear-gradient(180deg, #c0c0c0 0%, #a8a8a8 100%);
            height: 60px;
        }
        .podium-item.third .podium-bar {
            background: linear-gradient(180deg, #cd7f32 0%, #a0522d 100%);
            height: 50px;
        }
        .medal { font-size: 16px; }
        .medal.gold { filter: drop-shadow(0 0 5px #ffd700); }
        .medal.silver { filter: drop-shadow(0 0 5px #c0c0c0); }
        .medal.bronze { filter: drop-shadow(0 0 5px #cd7f32); }
        .rank { font-weight: bold; color: var(--gris); min-width: 24px; display: inline-block; }

        /* ÁREA STATS */
        .area-stats-card { grid-column: 1 / -1; }
        .area-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .area-card {
            background: var(--blanco);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 10px var(--sombra-suave);
        }
        .area-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .area-icon { font-size: 24px; }
        .area-name { font-weight: 700; color: var(--verde-oscuro); font-size: 14px; }
        .area-stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .area-stat { text-align: center; }
        .area-percent { font-size: 20px; font-weight: bold; }
        .area-count { font-size: 16px; font-weight: bold; color: var(--marron); }
        .area-label { display: block; font-size: 10px; color: var(--gris); }
        .area-bar {
            height: 8px;
            background: var(--gris-claro);
            border-radius: 4px;
            overflow: hidden;
        }
        .area-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* ATTENDANCE TABLE */
        .attendance-table { 
            background: var(--blanco); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 8px 30px var(--sombra-media);
            border: 3px solid var(--verde-oscuro);
        }

        .attendance-header {
            display: flex;
            background: linear-gradient(135deg, var(--verde-oscuro) 0%, var(--verde-medio) 100%);
            color: white;
            padding: 12px 0;
        }

        .attendance-header > div:first-child { background: var(--verde-bosque); color: white; }

        .header-cell {
            width: 35px;
            min-width: 35px;
            text-align: center;
            font-size: 11px;
            padding: 8px 0;
            font-weight: 600;
        }

        .header-cell.today { 
            background: linear-gradient(135deg, var(--dorado) 0%, var(--dorado-oscuro) 100%); 
            color: var(--verde-bosque); 
            font-weight: bold;
        }
        .header-cell.weekend { background: rgba(255,255,255,0.15); }

        .task-cell {
            width: 280px;
            min-width: 280px;
            padding: 0 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tarea-id-badge {
            font-size: 10px;
            background: linear-gradient(135deg, var(--dorado-claro) 0%, var(--dorado) 100%);
            padding: 3px 8px;
            border-radius: 8px;
            color: var(--verde-bosque);
            white-space: nowrap;
            font-weight: 700;
        }

        .tarea-content { flex: 1; min-width: 0; }
        .tarea-nombre { font-size: 13px; font-weight: 600; }
        .tarea-meta { font-size: 11px; color: var(--gris); display: flex; gap: 10px; flex-wrap: wrap; margin-top: 3px; }

        .meta-tag { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
        .p-alta { background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%); color: var(--rojo); }

            document.getElementById('personList').innerHTML = PERSONAS.map((p, i) => {
                const cant = funcionesData.filter(f => f.persona === p).length;
                const idx = i % 10;
                const iconos = ['fa-user-tie', 'fa-user-edit', 'fa-user-cog', 'fa-user-nurse', 'fa-user-hard-hat', 'fa-user', 'fa-user-check', 'fa-user-tag', 'fa-user-astronaut', 'fa-user-shield'];
                return `<div class="person-item ${personaSeleccionada === p ? 'active' : ''}" onclick="seleccionar('${p}')">
                    <span><i class="fas ${iconos[idx]}"></i> ${p}</span><span class="stats">${cant}</span>
                </div>`;
            }).join('');
        };

        const renderFiltro = () => {
            document.getElementById('filtroFrecuencia').innerHTML = FRECUENCIAS.map(f => 
                `<div class="filter-chip ${filtroFrecuencia === f ? 'active' : ''}" onclick="setFiltro('${f}')">${f}</div>`
            ).join('');
        };

        const renderCalendario = () => {
            document.getElementById('mesActual').textContent = `${MESES[mesActual]} ${anioActual}`;
            const dias = getDiasMes(mesActual, anioActual);
            let html = '<div class="header-cell task-cell">Tarea</div>';
            for (let d = 1; d <= dias; d++) {
                const fecha = new Date(anioActual, mesActual, d);
                let clase = esFinde(fecha) ? 'weekend' : '';
                if (formatFecha(fecha) === formatFecha(HOY)) clase += ' today';
                html += `<div class="header-cell ${clase}">${d}</div>`;
            }
            document.getElementById('attendanceHeader').innerHTML = html;
        };

        const renderTareas = () => {
            const grid = document.getElementById('attendanceGrid');
            document.getElementById('quickMarkPanel').style.display = personaSeleccionada ? 'flex' : 'none';

            let tareas = personaSeleccionada ? funcionesData.filter(f => f.persona === personaSeleccionada) : [];
            if (filtroFrecuencia !== 'Todas') tareas = tareas.filter(t => t.frecuencia === filtroFrecuencia);

            if (!tareas.length) {
                grid.innerHTML = '<p style="text-align:center;padding:40px;color:var(--verde-claro);">Selecciona una persona</p>';
                return;
            }

            const dias = getDiasMes(mesActual, anioActual);
            let html = '';

            tareas.forEach(t => {
                const prio = t.prioridad === 'Alta' ? 'p-alta' : t.prioridad === 'Media' ? 'p-media' : 'p-baja';
                html += `<div class="attendance-row">
                    <div class="header-cell task-cell">
                        <span class="tarea-id-badge">${t.id}</span>
                        <div class="tarea-content">
                            <div class="tarea-nombre">${t.func}</div>
                            <div class="tarea-meta">
                                <span class="meta-tag ${prio}">${t.prioridad}</span>
                                <span>⏱️ ${t.tiempo || '-'}</span>
                                <span><i class="fas fa-clock"></i> ${t.frecuencia}</span>
                            </div>
                        </div>
                    </div>`;
                
                for (let d = 1; d <= dias; d++) {
                    const fecha = new Date(anioActual, mesActual, d);
                    const fs = formatFecha(fecha);
                    const key = `${personaSeleccionada}_${t.id}_${fs}`;
                    const estado = asistencia[key] || '';
                    const bloq = estaBloqueado(fecha);
                    let clase = esFinde(fecha) ? 'weekend' : '';
                    if (formatFecha(fecha) === formatFecha(HOY)) clase += ' today';
                    if (bloq) clase += ' locked';
                    html += `<div class="day-cell ${clase}">
                        <button class="attendance-cell ${estado} ${bloq ? 'locked' : ''}" ${bloq ? 'disabled' : `onclick="marcar('${t.id}','${fs}')"`}>
                            ${estado === 'si' ? '✓' : estado === 'no' ? '✗' : estado === 'na' ? '-' : ''}
                        </button>
                    </div>`;
                }
                html += '</div>';
            });

            grid.innerHTML = html;
            actualizarStats(tareas);
        };

        const actualizarStats = (tareas) => {
            const dias = getDiasMes(mesActual, anioActual);
            let hechas = 0, total = 0;
            tareas.forEach(t => {
                for (let d = 1; d <= dias; d++) {
                    const fecha = new Date(anioActual, mesActual, d);
                    if (estaBloqueado(fecha)) continue;
                    const key = `${personaSeleccionada}_${t.id}_${formatFecha(fecha)}`;
                    if (asistencia[key]) { total++; if (asistencia[key] === 'si') hechas++; }
                }
            });
            document.getElementById('statTareas').textContent = tareas.length;
            document.getElementById('statCumplimiento').textContent = total ? Math.round(hechas/total*100) + '%' : '0%';
            renderDashboard();
        };

        const renderDashboard = () => {
            const statsDiv = document.getElementById('dashboardStats');
            const chartsDiv = document.getElementById('dashboardCharts');
            
            // Calcular estadísticas generales
            let totalTareas = 0, totalHechas = 0, totalNoHechas = 0, totalNA = 0;
            const porPersona = {};
            
            PERSONAS.forEach(p => {
                porPersona[p] = { total: 0, hechas: 0, porcentaje: 0 };
            });
            
            const dias = getDiasMes(mesActual, anioActual);
            funcionesData.forEach(t => {
                for (let d = 1; d <= dias; d++) {
                    const fecha = new Date(anioActual, mesActual, d);
                    if (estaBloqueado(fecha)) continue;
                    const key = `${t.persona}_${t.id}_${formatFecha(fecha)}`;
                    if (asistencia[key]) {
                        totalTareas++;
                        porPersona[t.persona].total++;
                        if (asistencia[key] === 'si') { totalHechas++; porPersona[t.persona].hechas++; }
                        else if (asistencia[key] === 'no') totalNoHechas++;
                        else if (asistencia[key] === 'na') totalNA++;
                    }
                }
            });
            
            // Calcular porcentajes por persona
            PERSONAS.forEach(p => {
                if (porPersona[p].total > 0) {
                    porPersona[p].porcentaje = Math.round(porPersona[p].hechas / porPersona[p].total * 100);
                }
            });
            
            const cumplimientoGeneral = totalTareas > 0 ? Math.round(totalHechas / totalTareas * 100) : 0;
            
            // Renderizar tarjetas de estadísticas
            statsDiv.innerHTML = `
                <div class="dash-stat-card">
                    <div class="value">${totalTareas}</div>
                    <div class="label">Total Marcas</div>
                </div>
                <div class="dash-stat-card gold">
                    <div class="value">${cumplimientoGeneral}%</div>
                    <div class="label">Cumplimiento General</div>
                </div>
                <div class="dash-stat-card">
                    <div class="value" style="color:#27ae60">${totalHechas}</div>
                    <div class="label">✓ Completadas</div>
                </div>
                <div class="dash-stat-card">
                    <div class="value" style="color:#e74c3c">${totalNoHechas}</div>
                    <div class="label">✗ Pendientes</div>
                </div>
            `;
            
            // Renderizar gráfico de barras por persona con ranking y medals
            const personasOrdenadas = PERSONAS.sort((a, b) => porPersona[b].porcentaje - porPersona[a].porcentaje);
            const top3 = personasOrdenadas.slice(0, 3);
            
            const getMedal = (pos) => {
                if (pos === 0) return '<span class="medal gold">🥇</span>';
                if (pos === 1) return '<span class="medal silver">🥈</span>';
                if (pos === 2) return '<span class="medal bronze">🥉</span>';
                return `<span class="rank">#${pos + 1}</span>`;
            };
            
            chartsDiv.innerHTML = `
                <!-- STATS POR ÁREA -->
                <div class="chart-card area-stats-card">
                    <h4>🏢 Estadísticas por Área (${MESES[mesActual]} ${anioActual})</h4>
                    ${renderAreaStats(porPersona, funcionesData)}
                </div>
                <!-- PODIUM TOP 3 -->
                <div class="chart-card podium-card">
                    <h4>🏆 Podio de Honor (${MESES[mesActual]} ${anioActual})</h4>
                    <div class="podium">
                        ${top3.length > 1 ? `
                        <div class="podium-item second">
                            <div class="medal-display">🥈</div>
                            <div class="podium-name">${top3[1].split(' ')[0]}</div>
                            <div class="podium-percent">${porPersona[top3[1]].porcentaje}%</div>
                            <div class="podium-bar" style="height:${Math.max(40, porPersona[top3[1]].porcentaje * 0.8)}px"></div>
                        </div>
                        ` : ''}
                        ${top3.length > 0 ? `
                        <div class="podium-item first">
                            <div class="medal-display">🥇</div>
                            <div class="podium-name">${top3[0].split(' ')[0]}</div>
                            <div class="podium-percent">${porPersona[top3[0]].porcentaje}%</div>
                            <div class="podium-bar" style="height:${Math.max(60, porPersona[top3[0]].porcentaje)}px"></div>
                        </div>
                        ` : ''}
                        ${top3.length > 2 ? `
                        <div class="podium-item third">
                            <div class="medal-display">🥉</div>
                            <div class="podium-name">${top3[2].split(' ')[0]}</div>
                            <div class="podium-percent">${porPersona[top3[2]].porcentaje}%</div>
                            <div class="podium-bar" style="height:${Math.max(30, porPersona[top3[2]].porcentaje * 0.6)}px"></div>
                        </div>
                        ` : ''}
                    </div>
                </div>
                <div class="chart-card">
                    <h4><i class="fas fa-users"></i> Detalle por Persona</h4>
                    ${personasOrdenadas.map((p, idx) => {
                        const nivel = porPersona[p].porcentaje >= 80 ? 'high' : porPersona[p].porcentaje >= 50 ? 'medium' : 'low';
                        const tieneTareas = porPersona[p].total > 0;
                        return `
                        <div class="bar-chart-item ${!tieneTareas ? 'no-tasks' : ''}">
                            <div class="bar-chart-label">
                                <span>${getMedal(idx)} ${p.split(' ')[0]}</span>
                                <span>${porPersona[p].hechas}/${porPersona[p].total} (${porPersona[p].porcentaje}%)</span>
                            </div>
                            <div class="bar-chart-bar">
                                <div class="bar-chart-fill ${nivel}" style="width: ${porPersona[p].porcentaje}%"></div>
                            </div>
                        </div>
                    `}).join('')}
                </div>
            `;
        };

        const renderAreaStats = (porPersona, funcionesData) => {
            const areas = ['ADMINISTRACION', 'DIRECCION', 'OPERACIONES', 'MARKETING', 'TERAPIAS', 'CAJA Y VENTAS'];
            const areaColores = {
                'ADMINISTRACION': '#3498db',
                'DIRECCION': '#9b59b6',
                'OPERACIONES': '#27ae60',
                'MARKETING': '#e67e22',
                'TERAPIAS': '#1abc9c',
                'CAJA Y VENTAS': '#f39c12'
            };
            const areaIconos = {
                'ADMINISTRACION': 'fa-briefcase',
                'DIRECCION': 'fa-crown',
                'OPERACIONES': 'fa-tools',
                'MARKETING': 'fa-bullhorn',
                'TERAPIAS': 'fa-spa',
                'CAJA Y VENTAS': 'fa-cash-register' /* o fa-money-bill */
            };
            
            const areaStats = {};
            areas.forEach(a => areaStats[a] = { total: 0, hechas: 0, personas: [] });
            
            // Calcular por área
            funcionesData.forEach(t => {
                if (areaStats[t.area]) {
                    const dias = getDiasMes(mesActual, anioActual);
                    for (let d = 1; d <= dias; d++) {
                        const fecha = new Date(anioActual, mesActual, d);
                        if (estaBloqueado(fecha)) continue;
                        const key = `${t.persona}_${t.id}_${formatFecha(fecha)}`;
                        if (asistencia[key]) {
                            areaStats[t.area].total++;
                            if (asistencia[key] === 'si') areaStats[t.area].hechas++;
                        }
                    }
                    if (!areaStats[t.area].personas.includes(t.persona)) {
                        areaStats[t.area].personas.push(t.persona);
                    }
                }
            });
            
            return `
                <div class="area-grid">
                    ${areas.filter(a => areaStats[a].total > 0).map(a => {
                        const pct = areaStats[a].total > 0 ? Math.round(areaStats[a].hechas / areaStats[a].total * 100) : 0;
                        const nivel = pct >= 80 ? 'high' : pct >= 50 ? 'medium' : 'low';
                        return `
                        <div class="area-card" style="border-left: 4px solid ${areaColores[a]}">
                            <div class="area-header">
                                <span class="area-icon"><i class="fas ${areaIconos[a]}"></i></span>
                                <span class="area-name">${a}</span>
                            </div>
                            <div class="area-stats-row">
                                <div class="area-stat">
                                    <span class="area-percent" style="color:${areaColores[a]}">${pct}%</span>
                                    <span class="area-label">cumplimiento</span>
                                </div>
                                <div class="area-stat">
                                    <span class="area-count">${areaStats[a].hechas}/${areaStats[a].total}</span>
                                    <span class="area-label">marcas</span>
                                </div>
                                <div class="area-stat">
                                    <span class="area-count">${areaStats[a].personas.length}</span>
                                    <span class="area-label">personas</span>
                                </div>
                            </div>
                            <div class="area-bar">
                                <div class="area-bar-fill ${nivel}" style="width:${pct}%;background:${areaColores[a]}"></div>
                            </div>
                        </div>
                    `}).join('')}
                </div>
            `;
        };

        const toggleDashboard = () => {
            const dash = document.getElementById('dashboard');
            if (dash.style.display === 'none') {
                dash.style.display = 'block';
                dash.style.animation = 'fadeIn 0.3s ease';
            } else {
                dash.style.display = 'none';
            }
        };

        const renderComentarios = () => {
            document.getElementById('commentsBadge').textContent = comentarios.length;
            const lista = document.getElementById('commentList');
            if (!comentarios.length) {
                lista.innerHTML = '<p style="text-align:center;color:var(--gris);padding:20px;">No hay mensajes</p>';
                return;
            }
            lista.innerHTML = comentarios.slice(0, 20).map(c => `
                <div class="comment-item">
                    <div class="comment-header"><strong>${c.autor}</strong><span>${c.fecha}</span></div>
                    <div class="comment-text">${c.texto}</div>
                </div>
            `).join('');
        };

        // ==================== ACTIONS ====================
        const login = (p) => {
            usuarioActual = p;
            localStorage.paluf_usuario = p;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex';
            document.getElementById('userWelcome').textContent = `👤 ${p}`;
            document.getElementById('userWelcome').style.display = 'inline';
            document.getElementById('btnLogout').style.display = 'inline-block';
            document.getElementById('btnExport').style.display = 'inline-block';
            if (['Luisa Torres', 'Julieth Melo', 'María Paula'].includes(p)) {
                document.getElementById('btnDashboard').style.display = 'inline-block';
            }
            seleccionar(p);
            renderComentarios();
            toast(`¡Bienvenido/a ${p}! 🎉`);
        };

        const toggleDarkMode = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('paluf_darkmode', isDark ? 'true' : 'false');
            document.getElementById('btnDarkMode').textContent = isDark ? '☀️' : '🌙';
            document.getElementById('btnDarkMode').title = isDark ? 'Modo Claro' : 'Modo Oscuro';
        };

        const logout = () => {
            if (!confirm('¿Salir?')) return;
            localStorage.removeItem('paluf_usuario');
            location.reload();
        };

        const exportarExcel = () => {
            // Crear CSV con los datos del mes actual
            let csv = 'PERSONA,TAREA,ÁREA,FRECUENCIA,PRIORIDAD';
            const dias = getDiasMes(mesActual, anioActual);
            
            // Agregar columnas de fechas
            for (let d = 1; d <= dias; d++) {
                const fecha = new Date(anioActual, mesActual, d);
                csv += `,${d}/${mesActual + 1}/${anioActual}`;
            }
            csv += '\n';
            
            // Agregar datos de cada persona y tarea
            funcionesData.forEach(t => {
                csv += `"${t.persona}","${t.func}","${t.area}","${t.frecuencia}","${t.prioridad}"`;
                for (let d = 1; d <= dias; d++) {
                    const fecha = new Date(anioActual, mesActual, d);
                    const fs = formatFecha(fecha);
                    const key = `${t.persona}_${t.id}_${fs}`;
                    const estado = asistencia[key] || '';
                    const marca = estado === 'si' ? '✓' : estado === 'no' ? '✗' : estado === 'na' ? 'N/A' : '';
                    csv += `,${marca}`;
                }
                csv += '\n';
            });
            
            // Crear y descargar archivo
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `PALUF_${MESES[mesActual]}_${anioActual}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            toast(`Exportado: PALUF_${MESES[mesActual]}_${anioActual}.csv`);
        };

        const seleccionar = (p) => {
            personaSeleccionada = p;
            localStorage.paluf_persona = p;
            document.getElementById('quickMarkPanel').style.display = 'flex';
            renderPersonas();
            renderTareas();
        };

        const setFiltro = (f) => {
            filtroFrecuencia = f;
            renderFiltro();
            renderTareas();
        };

        const cambiarMes = (d) => {
            mesActual += d;
            if (mesActual > 11) { mesActual = 0; anioActual++; }
            if (mesActual < 0) { mesActual = 11; anioActual--; }
            if (anioActual === 2026 && mesActual < 3) mesActual = 3;
            renderCalendario();
            renderTareas();
        };

        const irAHoy = () => {
            const hoy = new Date();
            const mesHoy = hoy.getMonth();
            const anioHoy = hoy.getFullYear();
            
            // Solo permite volver a meses desde abril 2026
            if (anioHoy === 2026 && mesHoy < 3) {
                toast('No se puede ir a fechas anteriores a abril 2026');
                return;
            }
            
            mesActual = mesHoy;
            anioActual = anioHoy;
            
            // Mostrar panel de acciones rápidas
            document.getElementById('quickMarkPanel').style.display = 'flex';
            
            renderCalendario();
            renderTareas();
            toast('📅 Hoy: ' + formatFecha(hoy));
        };

        const marcar = (id, fecha) => {
            if (!personaSeleccionada) return;
            const key = `${personaSeleccionada}_${id}_${fecha}`;
            const estados = ['', 'si', 'no', 'na'];
            const idx = estados.indexOf(asistencia[key] || '');
            asistencia[key] = estados[(idx + 1) % 4];
            guardar();
            renderTareas();
        };

        const marcarTodos = (estado) => {
            if (!personaSeleccionada) return;
            const dias = getDiasMes(mesActual, anioActual);
            funcionesData.filter(f => f.persona === personaSeleccionada).forEach(t => {
                for (let d = 1; d <= dias; d++) {
                    const fecha = new Date(anioActual, mesActual, d);
                    if (estaBloqueado(fecha)) continue;
                    asistencia[`${personaSeleccionada}_${t.id}_${formatFecha(fecha)}`] = estado;
                }
            });
            guardar();
            renderTareas();
            toast(`Marcado como ${estado === 'si' ? 'hecho' : estado === 'no' ? 'no hecho' : 'N/A'}`);
        };

        const limpiarMarcas = () => {
            if (!personaSeleccionada) return;
            const dias = getDiasMes(mesActual, anioActual);
            funcionesData.filter(f => f.persona === personaSeleccionada).forEach(t => {
                for (let d = 1; d <= dias; d++) {
                    const fecha = new Date(anioActual, mesActual, d);
                    if (estaBloqueado(fecha)) continue;
                    delete asistencia[`${personaSeleccionada}_${t.id}_${formatFecha(fecha)}`];
                }
            });
            guardar();
            renderTareas();
            toast('Marcas limpiadas');
        };

        const enviarComentario = () => {
            if (!usuarioActual) return;
            const texto = document.getElementById('commentInput').value.trim();
            if (!texto) return;
            comentarios.unshift({ autor: usuarioActual, texto, fecha: formatFecha(new Date()) });
            guardar();
            document.getElementById('commentInput').value = '';
            renderComentarios();
            toast('Mensaje enviado ✓');
        };

        // ==================== TAREA ====================
        const abrirModalTarea = () => {
            tareaEditando = null;
            document.getElementById('modalTitulo').textContent = 'Nueva Tarea';
            document.getElementById('formTarea').reset();
            document.getElementById('tareaId').value = '';
            document.getElementById('btnEliminar').style.display = 'none';
            document.getElementById('btnDuplicar').style.display = 'none';
            document.getElementById('tareaPersona').innerHTML = '<option value="">Seleccionar...</option>' + PERSONAS.map(p => `<option value="${p}">${p}</option>`).join('');
            if (personaSeleccionada) document.getElementById('tareaPersona').value = personaSeleccionada;
            document.getElementById('modalTarea').classList.add('visible');
        };

        const editarTarea = (id) => {
            const t = funcionesData.find(f => f.id === id);
            if (!t) return;
            tareaEditando = id;
            document.getElementById('modalTitulo').textContent = 'Editar Tarea';
            document.getElementById('tareaId').value = t.id;
            document.getElementById('tareaPersona').innerHTML = PERSONAS.map(p => `<option value="${p}" ${p === t.persona ? 'selected' : ''}>${p}</option>`).join('');
            document.getElementById('tareaNombre').value = t.func;
            document.getElementById('tareaArea').value = t.area;
            document.getElementById('tareaPrioridad').value = t.prioridad;
            document.getElementById('tareaFrecuencia').value = t.frecuencia;
            document.getElementById('tareaTiempo').value = t.tiempo || '';
            document.getElementById('btnEliminar').style.display = 'inline-block';
            document.getElementById('btnDuplicar').style.display = 'inline-block';
            document.getElementById('modalTarea').classList.add('visible');
        };

        const cerrarModal = () => {
            document.getElementById('modalTarea').classList.remove('visible');
            tareaEditando = null;
        };

        const duplicarTarea = () => {
            if (!tareaEditando) return;
            const t = funcionesData.find(f => f.id === tareaEditando);
            if (!t) return;
            funcionesData.push({ ...t, id: generarId(), func: t.func + ' (Copia)' });
            guardar();
            renderPersonas();
            renderTareas();
            cerrarModal();
            toast('✓ Tarea duplicada');
        };

        const confirmarEliminar = (id) => {
            if (confirm('¿Eliminar esta tarea?')) {
                funcionesData = funcionesData.filter(f => f.id !== id);
                guardar();
                renderPersonas();
                renderTareas();
                cerrarModal();
                toast('Tarea eliminada');
            }
        };

        const eliminarTarea = () => {
            if (!tareaEditando) return;
            confirmarEliminar(tareaEditando);
        };

        document.getElementById('formTarea').onsubmit = (e) => {
            e.preventDefault();
            const data = {
                id: document.getElementById('tareaId').value || generarId(),
                func: document.getElementById('tareaNombre').value,
                persona: document.getElementById('tareaPersona').value,
                area: document.getElementById('tareaArea').value,
                prioridad: document.getElementById('tareaPrioridad').value,
                frecuencia: document.getElementById('tareaFrecuencia').value,
                tiempo: document.getElementById('tareaTiempo').value
            };
            if (tareaEditando) {
                const idx = funcionesData.findIndex(f => f.id === tareaEditando);
                if (idx !== -1) funcionesData[idx] = data;
            } else {
                funcionesData.push(data);
            }
            guardar();
            cerrarModal();
            renderPersonas();
            renderTareas();
            toast('✓ Tarea guardada');
        };

        // ==================== DASHBOARD ====================
        const verDashboard = () => {
            const content = document.getElementById('dashboardContent');
            let html = '<h3 style="color:var(--verde-oscuro);margin-bottom:15px;">🏆 Ranking de Desempeño</h3>';
            let ranking = PERSONAS.map(p => {
                let hechas = 0, total = 0;
                funcionesData.filter(f => f.persona === p).forEach(t => {
                    Object.keys(asistencia).forEach(k => {
                        if (k.startsWith(`${p}_${t.id}_`)) {
                            total++;
                            if (asistencia[k] === 'si') hechas++;
                        }
                    });
                });
                return { persona: p, pct: total ? Math.round(hechas/total*100) : 0, hechas, total };
            });
            ranking.sort((a, b) => b.pct - a.pct);
            
            ranking.forEach((r, i) => {
                const color = r.pct >= 80 ? 'var(--verde-check)' : r.pct >= 50 ? 'var(--naranja)' : 'var(--rojo)';
                html += `<div class="ranking-item ${r.pct >= 80 ? 'high' : r.pct >= 50 ? 'medium' : 'low'}">
                    <div><strong>${i+1}. ${r.persona}</strong><br><small>${r.hechas}/${r.total} tareas</small></div>
                    <div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${r.pct}%; background:${color};"></div></div>
                        <div style="text-align:right; font-weight:bold; color:${color}">${r.pct}%</div>
                    </div>
                </div>`;
            });
            content.innerHTML = html;
            document.getElementById('modalDashboard').classList.add('visible');
        };

        const cerrarDashboard = () => document.getElementById('modalDashboard').classList.remove('visible');

        // ==================== INIT ====================
        const init = () => {
            cargar();
            renderLogin();
            renderPersonas();
            renderFiltro();
            renderCalendario();
            renderTareas();
            renderComentarios();

            // Cargar modo oscuro si estaba activo
            if (localStorage.getItem('paluf_darkmode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('btnDarkMode').textContent = '☀️';
                document.getElementById('btnDarkMode').title = 'Modo Claro';
            }

            const savedUser = localStorage.paluf_usuario;
            if (savedUser && PERSONAS.includes(savedUser)) {
                login(savedUser);
            }
        };

        const toast = (msg, tipo = 'success') => {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast show ${tipo}`;
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        init();
    </script>
</body>
</html>
